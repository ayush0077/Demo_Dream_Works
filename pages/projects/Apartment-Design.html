<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/png" sizes="32x32" href="/images/logo.png">
<title>Appartment Design</title>

<link rel="stylesheet" href="../../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div id="navbar"></div>

<!-- PAGE BANNER -->

<section class="page-banner-resedential">
<div class="banner-container">
<h1>Appartment Design</h1>
</div>
</section>

<!-- PROJECTS SECTION -->

<section class="projects-section">

<div class="projects-container">

<div class="project-card">

<img
src="../../images/APPARTMENT/LARGE/HATIIBAN.jpg"
data-full="../../images/APPARTMENT/LARGE/HATIIBAN.jpg"
onclick="openProject(this)"

data-title="HATIIBAN"
data-location="Kathmandu"
data-year="2022"
data-description="Modern residential house designed for urban living."
>

<div class="project-overlay">
    
<span class="project-title"></span>

</div>

</div>


<div class="project-card">

<img
src="../../images/APPARTMENT/LARGE/SITAPAILA.jpg"


onclick="openProject(this)"
data-full="../../images/APPARTMENT/LARGE/SITAPAILA.jpg"
data-title="SITAPAILA"
data-location="Lalitpur"
data-year="2023"
data-description="Luxury residential design with modern architecture."
>
<div class="project-overlay">
<span class="project-title">Ason Residence</span>
</div>
</div>














<div id="projectModal" class="project-modal">

<div class="modal-content">

<div class="modal-left">
<img id="modalImage">
</div>

<div class="modal-right">

<h2 id="modalTitle"></h2>

<p id="modalDescription"></p>
<!-- 
<p><strong>Location:</strong> <span id="modalLocation"></span></p>

<p><strong>Year:</strong> <span id="modalYear"></span></p> -->

<button onclick="closeProject()">Close</button>

</div>

</div>

</div>
</section>


<div id="footer"></div>

<script src="../../js/navbar.js"></script>
<script src="../../js/footbar.js"></script>
<script src="../../js/navbar_shrink.js"></script>
<script src="../../js/zoomer_projects.js"></script>
<script src="../../js/mobile_menu.js"></script>
<script src="../../js/darkmode.js"></script>
</body>
</html>
