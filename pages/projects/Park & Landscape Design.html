<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Residential Projects</title>

<link rel="stylesheet" href="../../css/style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

</head>

<body>

<div id="navbar"></div>

<!-- PAGE BANNER -->

<section class="page-banner-resedential">
<div class="banner-container">
<h1>PARK & LANDSCAPE</h1>
</div>
</section>

<!-- PROJECTS SECTION -->

<section class="projects-section">

<div class="projects-container">

<div class="project-card">

<img
src="../../images/PARK/BODE.jpg"
data-full="../../images/PARK/BODE.jpg"
onclick="openProject(this)"

data-title="BODE"
data-location="Kathmandu"
data-year="2022"
data-description="Luxury park and landscape design with modern architecture"
>

<div class="project-overlay">
    
<span class="project-title"></span>

</div>

</div>


<div class="project-card">

<img
src="../../images/PARK/PARBAT.jpg"


onclick="openProject(this)"
data-full="../../images/PARK/PARBAT.jpg"
data-title="PARBAT"
data-location="Lalitpur"
data-year="2023"
data-description="Luxury park and landscape design with modern architecture."
>
<div class="project-overlay">
<span class="project-title">Ason Residence</span>
</div>
</div>

<div class="project-card">

<img
src="../../images/PARK/RAUTAHAT.jpg"
data-full="../../images/PARK/RAUTAHAT.jpg"
onclick="openProject(this)"

data-title="RAUTAHAT"
data-location="Kathmandu"
data-year="2022"
data-description="Luxury park and landscape design with modern architecture"
>

<div class="project-overlay">
    
<span class="project-title"></span>

</div>

</div>

<div class="project-card">

<img
src="../../images/PARK/SATUNGAL.jpg"
data-full="../../images/PARK/SATUNGAL.jpg"
onclick="openProject(this)"

data-title="SATUNGAL"
data-location="Kathmandu"
data-year="2022"
data-description="Luxury park and landscape design with modern architecture"
>

<div class="project-overlay">
    
<span class="project-title"></span>

</div>

</div>














<div id="projectModal" class="project-modal">

<div class="modal-content">

<div class="modal-left">
<img id="modalImage">
</div>

<div class="modal-right">

<h2 id="modalTitle"></h2>

<p id="modalDescription"></p>
<!-- 
<p><strong>Location:</strong> <span id="modalLocation"></span></p>

<p><strong>Year:</strong> <span id="modalYear"></span></p> -->

<button onclick="closeProject()">Close</button>

</div>

</div>

</div>
</section>


<div id="footer"></div>

<script src="../../js/navbar.js"></script>
<script src="../../js/footbar.js"></script>
<script src="../../js/navbar_shrink.js"></script>
<script src="../../js/zoomer_projects.js"></script>

</body>
</html>
